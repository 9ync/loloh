<!DOCTYPE html>
<html lang="pt-BR" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="google" content="notranslate">
<title>lohanne</title>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#fff}
body{
position:relative;
font-family:"Helvetica Neue",Arial,sans-serif;
-webkit-font-smoothing:antialiased;
text-rendering:optimizeLegibility
}

.phrase{
position:absolute;
color:#000;
font-size:11px;
font-weight:200;
letter-spacing:1px;
line-height:1.4;
opacity:0;
filter:blur(10px);
transform:translateY(35px);
white-space:nowrap;
pointer-events:none;
user-select:none;
will-change:transform,opacity,filter
}

@media(max-width:768px){
.phrase{font-size:10px}
}
</style>
</head>

<body translate="no">

<script>

const repeated=[
"eu te amo.","eu te amo muito.","eu vivo por ti.","eu amo viver você.","lohanne, eu te amo.","eu amo você, minha princesa.","eu te amo, minha garota.","eu vivo você, minha paixão.","私大好きをロハンネ！","lohanne !","anne !","ぼくのロハンネをだいすき","eu te amo eu te amo eu te amo!","eu te amo com minha alma."
];

const secondary=[
"minha garota.","minha princesinha.","minha namorada.","minha mulher.","minha gatinha.","minha rainha.","minha amada.","fabulosa.","bonita.","perfeita.","gostosa.","maravilhosa.","meu anjinho.","minha pretinha.","minha miudinha.","incrível.","você é perfeita lohanne.","você é demasiadamente perfeita.","você é a mais linda atemporalmente."
];

const occupied=[];
let running=true;
let loop=null;

function phraseText(){
return Math.random()<0.75
? repeated[Math.floor(Math.random()*repeated.length)]
: secondary[Math.floor(Math.random()*secondary.length)];
}

function freePosition(w,h){

const padding=25;

for(let i=0;i<200;i++){

const x=Math.random()*(window.innerWidth-w-padding);
const y=Math.random()*(window.innerHeight-h-padding);

let overlap=false;

for(const p of occupied){

if(
x<p.x+p.w+20 &&
x+w+20>p.x &&
y<p.y+p.h+20 &&
y+h+20>p.y
){
overlap=true;
break;
}

}

if(!overlap) return {x,y};

}

return null;

}

function createPhrase(){

if(!running || document.hidden) return;

const el=document.createElement("div");
el.className="phrase";
el.setAttribute("translate","no");
el.innerText=phraseText();

document.body.appendChild(el);

const rect=el.getBoundingClientRect();
const pos=freePosition(rect.width,rect.height);

if(!pos){
el.remove();
return;
}

el.style.left=pos.x+"px";
el.style.top=pos.y+"px";

occupied.push({
x:pos.x,
y:pos.y,
w:rect.width,
h:rect.height,
el
});

gsap.to(el,{
opacity:1,
y:-55,
filter:"blur(0px)",
duration:3.8,
ease:"power2.out"
});

gsap.to(el,{
opacity:0,
filter:"blur(8px)",
duration:3.8,
delay:3.8,
ease:"power2.in",
onComplete:()=>{

const index=occupied.findIndex(p=>p.el===el);

if(index!==-1) occupied.splice(index,1);

el.remove();

}
});

}

function start(){
if(loop) return;
running=true;
loop=setInterval(createPhrase,700);
}

function stop(){

running=false;

clearInterval(loop);
loop=null;

gsap.globalTimeline.pause();

}

document.addEventListener("visibilitychange",()=>{

if(document.hidden){

stop();

}else{

gsap.globalTimeline.resume();
start();

}

});

window.addEventListener("blur",stop);

window.addEventListener("focus",()=>{
gsap.globalTimeline.resume();
start();
});

start();

</script>

</body>
</html>
