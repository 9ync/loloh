<!DOCTYPE html>
<html lang="pt-BR" translate="no">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <meta name="google" content="notranslate" />

  <title>lohanne</title>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,
    body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#ffffff;
      touch-action:none;
    }

    body{

      position:relative;

      font-family:
      "Helvetica Neue",
      Arial,
      sans-serif;

      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;

    }

    .phrase{

      position:absolute;

      color:#000;

      font-size:11px;
      font-weight:200;

      letter-spacing:1.2px;
      line-height:1.4;

      opacity:0;

      filter:blur(10px);

      transform:translateY(40px);

      white-space:nowrap;

      pointer-events:none;
      user-select:none;

      will-change:
      transform,
      opacity,
      filter;

    }

    @media (max-width:768px){

      .phrase{

        font-size:10px;
        letter-spacing:1px;

      }

    }

  </style>

</head>

<body translate="no">

<script>

const repeatedPhrases = [

  "eu te amo.",
  "eu te amo muito.",
  "eu vivo por ti.",
  "eu amo viver você.",
  "lohanne, eu te amo.",
  "eu amo você, minha princesa.",
  "eu te amo, minha garota.",
  "eu vivo você, minha paixão.",
  "私大好きをロハンネ！",
  "lohanne !",
  "anne !",
  "ぼくのロハンネをだいすき",
  "eu te amo eu te amo eu te amo!",
  "eu te amo com minha alma."

];

const secondaryPhrases = [

  "minha garota.",
  "minha princesinha.",
  "minha namorada.",
  "minha mulher.",
  "minha gatinha.",
  "minha rainha.",
  "minha amada.",
  "fabulosa.",
  "bonita.",
  "perfeita.",
  "gostosa.",
  "maravilhosa.",
  "meu anjinho.",
  "minha pretinha.",
  "minha miudinha.",
  "minha rainha.",
  "incrível.",
  "você é perfeita lohanne.",
  "você é demasiadamente perfeita.",
  "você é a mais linda atemporalmente."

];

function getPhrase(){

  const priorityChance = Math.random();

  if(priorityChance < 0.75){

    return repeatedPhrases[
      Math.floor(Math.random() * repeatedPhrases.length)
    ];

  }

  return secondaryPhrases[
    Math.floor(Math.random() * secondaryPhrases.length)
  ];

}

const activePositions = [];

let animationInterval = null;

function createPhrase(){

  if(document.hidden) return;

  const phrase = document.createElement("div");

  phrase.className = "phrase";

  phrase.setAttribute("translate", "no");

  phrase.innerText = getPhrase();

  document.body.appendChild(phrase);

  const rect = phrase.getBoundingClientRect();

  const margin = 30;

  const maxX = window.innerWidth - rect.width - margin;
  const maxY = window.innerHeight - rect.height - margin;

  let x;
  let y;

  let validPosition = false;

  let tries = 0;

  while(!validPosition && tries < 100){

    x = Math.random() * maxX;
    y = Math.random() * maxY;

    validPosition = true;

    for(const pos of activePositions){

      const horizontalOverlap =

        x < pos.x + pos.width + 20 &&
        x + rect.width + 20 > pos.x;

      const verticalOverlap =

        y < pos.y + pos.height + 20 &&
        y + rect.height + 20 > pos.y;

      if(horizontalOverlap && verticalOverlap){

        validPosition = false;
        break;

      }

    }

    tries++;

  }

  phrase.style.left = `${x}px`;
  phrase.style.top = `${y}px`;

  const currentPosition = {

    x,
    y,
    width: rect.width,
    height: rect.height

  };

  activePositions.push(currentPosition);

  gsap.to(phrase,{

    opacity:1,

    y:-65,

    filter:"blur(0px)",

    duration:4,

    ease:"power2.out"

  });

  gsap.to(phrase,{

    opacity:0,

    filter:"blur(8px)",

    duration:4,

    delay:4,

    ease:"power2.in",

    onComplete:()=>{

      phrase.remove();

      const index = activePositions.indexOf(currentPosition);

      if(index > -1){

        activePositions.splice(index, 1);

      }

    }

  });

}

function startAnimation(){

  if(animationInterval) return;

  animationInterval = setInterval(createPhrase, 650);

}

function stopAnimation(){

  clearInterval(animationInterval);

  animationInterval = null;

}

document.addEventListener("visibilitychange", () => {

  if(document.hidden){

    stopAnimation();

    gsap.globalTimeline.pause();

  } else {

    gsap.globalTimeline.resume();

    startAnimation();

  }

});

startAnimation();

</script>

</body>
</html>
