<!DOCTYPE html>
<html lang="pt-BR" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="google" content="notranslate">
<title>lohanne</title>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#fff
}

body{
position:relative;
font-family:"Helvetica Neue",Arial,sans-serif;
-webkit-font-smoothing:antialiased;
text-rendering:optimizeLegibility
}

#intro{
position:absolute;
inset:0;
overflow:hidden;
z-index:1
}

#hub{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#fff;
opacity:0;
pointer-events:none;
z-index:20
}

#hub.active{
opacity:1;
pointer-events:auto
}

.hub-text{
font-size:14px;
font-weight:300;
letter-spacing:3px;
color:#111
}

.phrase{
position:absolute;
color:#000;
font-size:11px;
font-weight:200;
letter-spacing:1px;
line-height:1.4;
opacity:0;
filter:blur(10px);
transform:translateY(35px);
white-space:nowrap;
pointer-events:none;
user-select:none;
will-change:transform,opacity,filter
}

.love-button-wrap{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
z-index:9999
}

.love-button{
position:relative;
border:none;
outline:none;
cursor:pointer;

padding:14px 30px;

border-radius:999px;

font-size:11px;
font-weight:300;
letter-spacing:2px;

color:#111;

background:rgba(255,255,255,.08);

backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);

box-shadow:
0 4px 30px rgba(0,0,0,.04),
inset 0 0 0 1px rgba(255,255,255,.25);

overflow:hidden;

transition:
transform .4s ease,
opacity .5s ease,
background .4s ease
}

.love-button:hover{
transform:scale(1.03)
}

.love-button::before{

content:"";

position:absolute;
inset:0;

border-radius:inherit;

padding:1px;

background:linear-gradient(
120deg,
transparent 0%,
rgba(255,255,255,.02) 20%,
rgba(255,255,255,.45) 50%,
rgba(255,255,255,.02) 80%,
transparent 100%
);

-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);

-webkit-mask-composite:xor;
mask-composite:exclude;

animation:borderGlow 4s linear infinite;

opacity:.7
}

.love-button::after{

content:"";

position:absolute;

top:-120%;
left:-40%;

width:60%;
height:300%;

background:linear-gradient(
to bottom,
transparent,
rgba(255,255,255,.35),
transparent
);

transform:rotate(25deg);

animation:shine 5s linear infinite;

opacity:.5
}

@keyframes shine{

0%{
transform:translateX(-250%) rotate(25deg)
}

100%{
transform:translateX(450%) rotate(25deg)
}

}

@keyframes borderGlow{

0%{
opacity:.35
}

50%{
opacity:.75
}

100%{
opacity:.35
}

}

@media(max-width:768px){

.phrase{
font-size:10px
}

.love-button{
font-size:10px;
padding:13px 26px
}

}

</style>
</head>

<body translate="no">

<div id="intro">

<div class="love-button-wrap">
<button class="love-button" id="enterButton">
i luv u 𖹭
</button>
</div>

</div>

<div id="hub">
<div class="hub-text">
new hub.
</div>
</div>

<script>

const repeated=[
"eu te amo.","eu te amo muito.","eu vivo por ti.","eu amo viver você.","lohanne, eu te amo.","eu amo você, minha princesa.","eu te amo, minha garota.","eu vivo você, minha paixão.","私大好きをロハンネ！","lohanne !","anne !","ぼくのロハンネをだいすき","eu te amo eu te amo eu te amo!","eu te amo com minha alma."
];

const secondary=[
"minha garota.","minha princesinha.","minha namorada.","minha mulher.","minha gatinha.","minha rainha.","minha amada.","fabulosa.","bonita.","perfeita.","gostosa.","maravilhosa.","meu anjinho.","minha pretinha.","minha miudinha.","incrível.","você é perfeita lohanne.","você é demasiadamente perfeita.","você é a mais linda atemporalmente."
];

const occupied=[];
const intro=document.getElementById("intro");
const hub=document.getElementById("hub");
const button=document.getElementById("enterButton");

let running=true;
let loop=null;
let entered=false;

function phraseText(){
return Math.random()<0.75
? repeated[Math.floor(Math.random()*repeated.length)]
: secondary[Math.floor(Math.random()*secondary.length)];
}

function freePosition(w,h){

const padding=25;

for(let i=0;i<200;i++){

const x=Math.random()*(window.innerWidth-w-padding);
const y=Math.random()*(window.innerHeight-h-padding);

let overlap=false;

for(const p of occupied){

if(
x<p.x+p.w+20 &&
x+w+20>p.x &&
y<p.y+p.h+20 &&
y+h+20>p.y
){
overlap=true;
break;
}

}

if(!overlap) return {x,y};

}

return null;

}

function createPhrase(){

if(!running || document.hidden || entered) return;

const el=document.createElement("div");

el.className="phrase";

el.setAttribute("translate","no");

el.innerText=phraseText();

intro.appendChild(el);

const rect=el.getBoundingClientRect();

const pos=freePosition(rect.width,rect.height);

if(!pos){
el.remove();
return;
}

el.style.left=pos.x+"px";
el.style.top=pos.y+"px";

occupied.push({
x:pos.x,
y:pos.y,
w:rect.width,
h:rect.height,
el
});

gsap.to(el,{
opacity:1,
y:-55,
filter:"blur(0px)",
duration:3.8,
ease:"power2.out"
});

gsap.to(el,{
opacity:0,
filter:"blur(8px)",
duration:3.8,
delay:3.8,
ease:"power2.in",
onComplete:()=>{

const index=occupied.findIndex(p=>p.el===el);

if(index!==-1) occupied.splice(index,1);

el.remove();

}
});

}

function start(){

if(loop || entered) return;

running=true;

loop=setInterval(createPhrase,700);

}

function stop(){

running=false;

clearInterval(loop);

loop=null;

gsap.globalTimeline.pause();

}

document.addEventListener("visibilitychange",()=>{

if(document.hidden){

stop();

}else if(!entered){

gsap.globalTimeline.resume();

start();

}

});

window.addEventListener("blur",()=>{

if(!entered) stop();

});

window.addEventListener("focus",()=>{

if(!entered){

gsap.globalTimeline.resume();

start();

}

});

button.addEventListener("click",()=>{

if(entered) return;

entered=true;

running=false;

clearInterval(loop);

button.style.pointerEvents="none";

gsap.to(button,{
opacity:0,
scale:.96,
duration:.6,
ease:"power2.out"
});

const phrases=document.querySelectorAll(".phrase");

phrases.forEach((el)=>{

gsap.to(el,{
opacity:0,
filter:"blur(14px)",
duration:.9,
ease:"power2.out",
onComplete:()=>{
el.remove();
}
});

});

setTimeout(()=>{

intro.style.display="none";

hub.classList.add("active");

gsap.to(hub,{
opacity:1,
duration:1.2,
ease:"power2.out"
});

},1000);

});

start();

</script>

</body>
</html>
